<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #hit-area {
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.004); /* Nearly transparent but receives events */
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    #hit-area:active { cursor: grabbing; }
  </style>
</head>
<body>
  <div id="hit-area"></div>
  <script src="hit-renderer.js"></script>
</body>
</html>
