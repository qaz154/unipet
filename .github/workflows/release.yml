name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm typecheck

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Package
        run: pnpm --filter @unipet/desktop run build:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: unipet-win
          path: apps/desktop/release/*.exe

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Package
        run: pnpm --filter @unipet/desktop run build:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: unipet-mac
          path: apps/desktop/release/*.dmg

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Package
        run: pnpm --filter @unipet/desktop run build:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: unipet-linux
          path: apps/desktop/release/*.AppImage

  release:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Verify packaged artifacts and generate checksums
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"

          test -f "unipet-win/UniPet.Setup.${version}.exe"
          test -f "unipet-linux/UniPet-${version}.AppImage"
          find unipet-mac -maxdepth 1 -type f -name "UniPet-${version}*.dmg" | grep -q .

          min_size=$((10 * 1024 * 1024))
          for file in unipet-win/* unipet-mac/* unipet-linux/*; do
            size=$(stat -c%s "$file")
            if [ "$size" -lt "$min_size" ]; then
              echo "Artifact too small: $file ($size bytes)" >&2
              exit 1
            fi
          done

          sha256sum unipet-win/* unipet-mac/* unipet-linux/* > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            unipet-win/*
            unipet-mac/*
            unipet-linux/*
            SHA256SUMS.txt
          generate_release_notes: true
      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          assets="$(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')"

          if ! grep -Fxq "UniPet.Setup.${version}.exe" <<< "$assets"; then
            echo "Missing release asset: UniPet.Setup.${version}.exe" >&2
            echo "Published assets:" >&2
            echo "$assets" >&2
            exit 1
          fi

          if ! grep -Eq "^UniPet-${version}.*\.dmg$" <<< "$assets"; then
            echo "Missing macOS release asset matching: UniPet-${version}*.dmg" >&2
            echo "Published assets:" >&2
            echo "$assets" >&2
            exit 1
          fi

          if ! grep -Fxq "UniPet-${version}.AppImage" <<< "$assets"; then
            echo "Missing release asset: UniPet-${version}.AppImage" >&2
            echo "Published assets:" >&2
            echo "$assets" >&2
            exit 1
          fi

          if ! grep -Fxq "SHA256SUMS.txt" <<< "$assets"; then
            echo "Missing release asset: SHA256SUMS.txt" >&2
            echo "Published assets:" >&2
            echo "$assets" >&2
            exit 1
          fi

          echo "Verified release assets for $TAG_NAME"
