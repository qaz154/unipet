name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm typecheck

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Package
        run: pnpm --filter @unipet/desktop run build:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: unipet-win
          path: apps/desktop/release/*.exe

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Package
        run: pnpm --filter @unipet/desktop run build:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: unipet-mac
          path: apps/desktop/release/*.dmg

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Package
        run: pnpm --filter @unipet/desktop run build:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: unipet-linux
          path: apps/desktop/release/*.AppImage

  release:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            unipet-win/*
            unipet-mac/*
            unipet-linux/*
          generate_release_notes: true
      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          assets="$(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')"

          if ! grep -Fxq "UniPet.Setup.${version}.exe" <<< "$assets"; then
            echo "Missing release asset: UniPet.Setup.${version}.exe" >&2
            echo "Published assets:" >&2
            echo "$assets" >&2
            exit 1
          fi

          if ! grep -Eq "^UniPet-${version}.*\.dmg$" <<< "$assets"; then
            echo "Missing macOS release asset matching: UniPet-${version}*.dmg" >&2
            echo "Published assets:" >&2
            echo "$assets" >&2
            exit 1
          fi

          if ! grep -Fxq "UniPet-${version}.AppImage" <<< "$assets"; then
            echo "Missing release asset: UniPet-${version}.AppImage" >&2
            echo "Published assets:" >&2
            echo "$assets" >&2
            exit 1
          fi

          echo "Verified release assets for $TAG_NAME"
